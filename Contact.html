<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — AliM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8;
    --muted: rgba(240,237,232,0.42);
    --muted2: rgba(240,237,232,0.22);
    --accent: #5b9cf6;
    --accent-dim: rgba(91,156,246,0.12);
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 54px;
    background: rgba(14,14,14,0.9);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 28px;
    gap: 16px;
    z-index: 100;
  }

  .nav-home {
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    border: 0.5px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    flex-shrink: 0;
    text-decoration: none;
    color: var(--text);
  }
  .nav-home:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.05); }
  .nav-home svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  .nav-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.12em;
    color: rgba(240,237,232,0.5);
    margin-left: auto;
    flex-shrink: 0;
  }

  /* ── LAYOUT ── */
  .page {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 54px 24px 0;
  }

  .contact-wrap {
    display: flex;
    gap: 0;
    width: 100%;
    max-width: 780px;
    border: 0.5px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: var(--surface);
  }

  /* ── LEFT INFO PANEL ── */
  .info-panel {
    width: 260px;
    flex-shrink: 0;
    background: var(--surface2);
    border-right: 0.5px solid var(--border);
    padding: 36px 28px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    overflow: hidden;
  }

  /* diagonal lines decoration */
  .info-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: repeating-linear-gradient(
      -45deg, transparent, transparent 30px,
      rgba(255,255,255,0.012) 30px, rgba(255,255,255,0.012) 31px
    );
    pointer-events: none;
  }

  .info-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }

  .info-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 0.04em;
    line-height: 0.95;
    color: var(--text);
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }

  .info-desc {
    font-size: 12.5px;
    line-height: 1.75;
    color: var(--muted);
    margin-bottom: 36px;
    position: relative;
    z-index: 1;
  }

  .info-email-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted2);
    margin-bottom: 6px;
    position: relative;
    z-index: 1;
  }

  .info-email {
    font-size: 13px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.02em;
    position: relative;
    z-index: 1;
    word-break: break-all;
    transition: opacity 0.2s;
  }
  .info-email:hover { opacity: 0.7; }

  .info-availability {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  .avail-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px rgba(74,222,128,0.6);
    flex-shrink: 0;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .avail-text {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ── RIGHT FORM PANEL ── */
  .form-panel {
    flex: 1;
    padding: 36px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 7px;
  }

  .field label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .field input,
  .field textarea {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 300;
    outline: none;
    transition: border-color 0.2s;
    resize: none;
    width: 100%;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: rgba(91,156,246,0.45);
  }

  .field input::placeholder,
  .field textarea::placeholder {
    color: var(--muted2);
  }

  .field textarea {
    height: 110px;
  }

  .send-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 13px 24px;
    background: var(--accent);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.04em;
    cursor: pointer;
    text-decoration: none;
    transition: opacity 0.2s, transform 0.15s;
    margin-top: 4px;
  }
  .send-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .send-btn:active { transform: translateY(0); }
  .send-btn svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }

  /* ── MOBILE ── */
  @media (max-width: 620px) {
    html, body { overflow: auto; }
    .page { height: auto; align-items: flex-start; padding-top: calc(54px + 32px); padding-bottom: 40px; }
    .contact-wrap { flex-direction: column; }
    .info-panel { width: 100%; border-right: none; border-bottom: 0.5px solid var(--border); }
    .info-availability { margin-top: 24px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-home" aria-label="Home">
    <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
  </a>
  <span class="nav-title">Contact</span>
</nav>

<div class="page">
  <div class="contact-wrap">

    <!-- LEFT: info -->
    <div class="info-panel">
      <div class="info-label">Get in touch</div>
      <div class="info-title">Contact Me</div>
      <div class="info-desc">Have a project in mind, a question, or just want to say hi? Fill in the form and I'll get back to you.</div>
      <div class="info-email-label">Or email directly</div>
      <!-- Replace with email -->
      <a href="mailto:am.tnl0192@gmail.com" class="info-email">am.tnl0192@gmail.com</a>
      <div class="info-availability">
        <div class="avail-dot"></div>
        <span class="avail-text">Available for work</span>
      </div>
    </div>

    <!-- RIGHT: form -->
    <div class="form-panel">

      <div class="field">
        <label for="name">Name</label>
        <input type="text" id="name" placeholder="Your name">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com">
      </div>

      <div class="field">
        <label for="message">Message</label>
        <textarea id="message" placeholder="What's on your mind?"></textarea>
      </div>

      <!-- Clicking this opens their email app with fields pre-filled -->
      <a id="sendBtn" href="#" class="send-btn" onclick="sendEmail(); return false;">
        <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/></svg>
        Send Message
      </a>

    </div>
  </div>
</div>

<script>
function sendEmail() {
  const name    = document.getElementById('name').value.trim();
  const email   = document.getElementById('email').value.trim();
  const message = document.getElementById('message').value.trim();

  if (!name || !email || !message) {
    alert('Please fill in all fields before sending.');
    return;
  }

  // Replace with actual email address
  const to      = 'am.tnl0192@gmail.com';
  const subject = encodeURIComponent(`Portfolio Contact from ${name}`);
  const body    = encodeURIComponent(
    `Name: ${name}\nEmail: ${email}\n\nMessage:\n${message}`
  );

  window.location.href = `mailto:${to}?subject=${subject}&body=${body}`;
}
</script>

</body>
</html>
